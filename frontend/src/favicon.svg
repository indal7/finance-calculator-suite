<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0B1437"/>
  <!-- Bar chart bars (representing finance/calculator) -->
  <rect x="9"  y="38" width="10" height="18" rx="2.5" fill="#F5A623" opacity="0.7"/>
  <rect x="23" y="26" width="10" height="30" rx="2.5" fill="#F5A623"/>
  <rect x="37" y="32" width="10" height="24" rx="2.5" fill="#00C896" opacity="0.85"/>
  <!-- Trend line on top -->
  <polyline
    points="14,36 28,24 42,30 56,14"
    fill="none"
    stroke="#F5A623"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Trend line dot -->
  <circle cx="56" cy="14" r="3.5" fill="#F5A623"/>
  <!-- Rupee symbol hint — small ₹ top-left area -->
  <text x="48" y="58" font-size="10" fill="#F5A623" font-family="system-ui,sans-serif" font-weight="700" opacity="0.5">₹</text>
</svg>

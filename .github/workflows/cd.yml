name: CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'terraform/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_DEPLOY_REGION || 'ap-south-1' }}
  TF_IN_AUTOMATION: true

# ──────────────────────────────────────────────────────────────────────────────
# Gate: Tests MUST pass before any Terraform or deploy job runs.
# If either test job fails, the entire pipeline stops.
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  backend-test:
    name: Backend Tests (Gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  frontend-test:
    name: Frontend Tests (Gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test -- --watch=false

  terraform-backend:
    name: Provision Backend AWS Resources
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (backend)
        working-directory: terraform/backend
        run: terraform init -reconfigure

      - name: Terraform Validate (backend)
        working-directory: terraform/backend
        run: terraform validate

      - name: Terraform Plan (backend)
        working-directory: terraform/backend
        run: terraform plan -var="aws_region=${{ env.AWS_REGION }}" -out=tfplan

      - name: Terraform Apply (backend)
        working-directory: terraform/backend
        run: terraform apply tfplan

      - name: Export backend outputs
        id: backend_outputs
        working-directory: terraform/backend
        run: |
          echo "api_gateway_url=$(terraform output -raw api_gateway_url)" >> "$GITHUB_OUTPUT"

    outputs:
      api_gateway_url: ${{ steps.backend_outputs.outputs.api_gateway_url }}

  terraform-frontend:
    name: Provision Frontend AWS Resources
    needs: [backend-test, frontend-test, terraform-backend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (frontend)
        working-directory: terraform/frontend
        run: terraform init -reconfigure

      - name: Terraform Validate (frontend)
        working-directory: terraform/frontend
        run: terraform validate

      - name: Terraform Plan (frontend)
        working-directory: terraform/frontend
        run: terraform plan -var="aws_region=${{ env.AWS_REGION }}" -out=tfplan

      - name: Terraform Apply (frontend)
        working-directory: terraform/frontend
        run: terraform apply tfplan

      - name: Export frontend outputs
        id: frontend_outputs
        working-directory: terraform/frontend
        run: |
          echo "s3_bucket_name=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

    outputs:
      s3_bucket_name: ${{ steps.frontend_outputs.outputs.s3_bucket_name }}
      cloudfront_distribution_id: ${{ steps.frontend_outputs.outputs.cloudfront_distribution_id }}

  deploy-frontend:
    name: Build and Deploy Frontend
    needs: [terraform-backend, terraform-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Inject API URL into production environment
        run: |
          API_URL="${{ needs.terraform-backend.outputs.api_gateway_url }}"
          sed -i "s|apiBase:.*|apiBase: '${API_URL}'|g" frontend/src/environments/environment.prod.ts

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Resolve frontend build directory
        id: build_dir
        run: |
          if [ -d "frontend/dist/browser" ]; then
            echo "path=frontend/dist/browser" >> "$GITHUB_OUTPUT"
          elif [ -d "frontend/dist/frontend/browser" ]; then
            echo "path=frontend/dist/frontend/browser" >> "$GITHUB_OUTPUT"
          elif [ -d "frontend/dist/frontend" ]; then
            echo "path=frontend/dist/frontend" >> "$GITHUB_OUTPUT"
          else
            echo "Unable to find Angular build output under frontend/dist"
            exit 1
          fi

      - name: Upload assets to S3
        run: |
          aws s3 sync "${{ steps.build_dir.outputs.path }}/" s3://${{ needs.terraform-frontend.outputs.s3_bucket_name }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ needs.terraform-frontend.outputs.cloudfront_distribution_id }} --paths '/*'
